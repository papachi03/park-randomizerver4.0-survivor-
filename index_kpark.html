      // "T_UI_K41_TheKrasue_Portrait.png" -> "TheKrasue"
      return file

        .replace(/^T_UI_K\d+_/,"")
        .replace(/^K\d+_/,"");

    let shuffleInterval = null;
    let killerShuffleInterval = null;
    let isShuffling = false;

    function getRandomParks() {
      const shuffled = [...allParks].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, 4);
    }

    function renderParks(parks) {
      const container = document.getElementById('perkContainer');
      container.innerHTML = '';
      parks.forEach(park => {
        const div = document.createElement('div');
        div.className = 'perk';
        div.innerHTML = `
          <img src="${park.icon}" alt="${park.name}" style="width:96px;height:96px;margin-bottom:12px;">
          <div class="perk-name">${park.name}</div>
          <div class="perk-desc">${park.description}</div>
        `;
        container.appendChild(div);
      });
    }

    function startShuffle() {
      // すでに回ってるなら何もしない
      if (isShuffling) return;
      isShuffling = true;

      // キラーもスロットっぽくシャッフル（ストップで確定）
      const killerIconEl = document.getElementById("killerIcon");
      const killerNameEl = document.getElementById("killerName");

      const tickKiller = () => {
        currentKiller = pickRandomKiller();
        if (killerIconEl) killerIconEl.src = currentKiller.icon;
        if (killerNameEl) killerNameEl.textContent = currentKiller.name;
      };
      tickKiller(); // すぐ1回表示
      killerShuffleInterval = setInterval(tickKiller, 80);


      if (startSound) {
        startSound.currentTime = 0;
        startSound.play().catch(() => {});
      }

      shuffleInterval = setInterval(() => {
        const parks = getRandomParks();
        renderParks(parks);
      }, 100);
    }

    // ★ここが「結果欄に 〇〇、〇〇、〇〇、〇〇 を出す」対応版
    function stopShuffle() {
      if (!isShuffling) return;

      clearInterval(shuffleInterval);
      shuffleInterval = null;

      if (killerShuffleInterval) {
        clearInterval(killerShuffleInterval);
        killerShuffleInterval = null;
      }
      isShuffling = false;

      if (stopSound) {
        stopSound.currentTime = 0;
        stopSound.play().catch(() => {});
      }

      // 表示中の4パーク名を取得して結果欄へ
      const perkNames = Array.from(document.querySelectorAll(".perk-name"))
        .map(el => el.textContent.trim())
        .filter(Boolean);

      document.getElementById("resultText").value = `使用するキラー：${currentKiller?.name ?? "不明"}、指定パーク：${perkNames.join("、")}`;
    }

    // ★コピー関数
    function copyResult() {
      const input = document.getElementById("resultText");
      const text = input.value.trim();
      if (!text) return;

      // 新しめブラウザ優先
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).catch(() => {});
        return;
      }

      // 互換用
      input.select();
      input.setSelectionRange(0, 99999);
      document.execCommand("copy");
      input.setSelectionRange(0, 0);
      input.blur();
    }

    // ===== 音量 + 自動再生制限対策 =====
    window.addEventListener('DOMContentLoaded', () => {
      if (fireSound)  fireSound.volume = 0.05;
      if (bgmSound)   bgmSound.volume  = 0.05;
      if (startSound) startSound.volume = 0.1;
      if (stopSound)  stopSound.volume  = 0.1;

      // 最初のユーザー操作で再生
      const playAudio = () => {
        fireSound?.play().catch(() => {});
        bgmSound?.play().catch(() => {});
        document.removeEventListener('click', playAudio);
      };
      document.addEventListener('click', playAudio);
    });
  
    // 初期表示（何も押してない時の見た目用）
    (function initKiller(){
      currentKiller = pickRandomKiller();
      const killerIconEl = document.getElementById("killerIcon");

      if (killerIconEl) killerIconEl.src = currentKiller.icon;
      if (killerNameEl) killerNameEl.textContent = currentKiller.name;
    })();
